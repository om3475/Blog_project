<!-- header-->
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Django Blogs</title>
    <link href="https://getbootstrap.com/docs/4.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Playfair+Display:700,900" rel="stylesheet">
    <link href="{% static 'css/blog.css'%}" rel="stylesheet">
  </head>
<body>
    <div class="container">
      <header class="blog-header py-3">
        <div class="row flex-nowrap justify-content-between align-items-center">
          <div class="col-3 pt-1">
            <a class="blog-header-logo text-dark" href="/">Django Blog</a>
          </div>
           <div class="col-5 ">
             <form action="{%url 'search' %}" method="GET">
             <div class="input-group">
                <input class="form-control" name="search" value="{{keyword}}" type="text" placeholder="Enter search term..." aria-label="Enter search term..." aria-describedby="button-search" />
                  <button  class="btn btn-warning" id="button-search" type="submit">Go!</button>
              
            </div>
            </form> 
               
          </div>

          <div class="col-4 d-flex justify-content-end align-items-center">
            {% if user.is_authenticated %}
            <span>You Are Login As {{user}}<a href="{% url 'logout' %}"> &emsp; Log Out</a></span>
            {% else %}
            <a class="btn btn-sm btn-warning" href="{% url 'login' %}">Login</a> &nbsp;
            <a class="btn btn-sm btn-outline-secondary" href="{%url 'registration' %}">Register</a>
            {% endif %}
          </div>
        </div>
      </header>

      <div class="nav-scroller py-1 mb-2">
        <nav class="nav d-flex justify-content-between">
          {% for cat in categories %}
          <a class="p-2 text-muted" href="{% url 'blog_by_category' cat.id %}">{{cat.category_name}}</a>
          {%endfor%}
        </nav>
      </div>
<!-- Content-->
{% block content %}

{%endblock%}

<!-- Content-->


<!-- footer-->


<footer class="blog-footer">
  <p>Django blog built with � by <a href="#">Om Patel</a></p>
</footer>
</body>
</html>
