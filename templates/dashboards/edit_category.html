{% extends 'base.html' %}
{% block content%}
{% load crispy_forms_tags %}
<div class="row">

    {% include 'dashboards/sidebar.html' %}


    <div class="col-md-9">
        <h2 style="margin-bottom: 10px;">Edit Category</h2>
      <form action="{% url 'edit_category' category.id %}" method="post" style="width: 50%;"> 
        {% csrf_token %}
        {{form | crispy}}
        
        <button type="submit" class="btn btn-warning" style="width: 100px; margin-bottom: 20px;">Edit</button>

      </form>

    </div>
</div>

{% endblock%}
