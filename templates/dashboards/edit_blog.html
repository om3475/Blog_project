{% extends 'base.html' %}
{% block content%}
{% load crispy_forms_tags %}
<div class="row">

    {% include 'dashboards/sidebar.html' %}


    <div class="col-md-9">
        <h2>Edit Blog</h2>
      <form action="{% url 'edit_blog' blog.id %}" method="post" style="width: 100%;" enctype="multipart/form-data"> 
        {% csrf_token %}
        {{form | crispy}}
        
        <button type="submit" class="btn btn-warning" style="width: 100px;">Edit</button>

      </form>

    </div>
</div>

{% endblock%}
